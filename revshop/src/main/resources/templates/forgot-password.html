<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>Forgot Password - RevShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg top-nav sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-light" href="/home">RevShop</a>
        <div class="ms-auto d-flex gap-2">
            <a class="btn btn-sm btn-light" href="/home">Home</a>
            <a class="btn btn-sm btn-outline-light" href="/login">Login</a>
        </div>
    </div>
</nav>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow-sm p-4">
                <h3 class="mb-3">Forgot Password</h3>
                <form id="forgotPasswordForm" onsubmit="requestForgotPassword(event)">
                    <input class="form-control mb-2" type="email" name="email" placeholder="Registered email" required>
                    <button class="btn btn-primary w-100" type="submit">Generate reset token</button>
                </form>
                <p id="forgotPasswordMessage" class="mt-2 small"></p>
                <div id="forgotPasswordTokenWrap" class="alert alert-warning mt-3 d-none">
                    <div class="small fw-semibold mb-1">Use this reset token:</div>
                    <div id="forgotPasswordToken" class="small text-break"></div>
                    <a class="btn btn-sm btn-outline-primary mt-2" href="/reset-password">Go to reset page</a>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/auth.js}"></script>
</body>
</html>
