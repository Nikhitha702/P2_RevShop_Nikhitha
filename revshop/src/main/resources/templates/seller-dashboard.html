<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>Seller Dashboard - RevShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg top-nav sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">RevShop Seller</a>
        <div class="ms-auto d-flex align-items-center gap-2">
            <a class="btn btn-sm btn-light" href="/">Storefront</a>
            <form method="post" action="/logout">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-sm btn-outline-light" type="submit">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="row g-4">
        <div class="col-lg-6">
            <div class="card section-card p-3">
                <h5>Add Product</h5>
                <form id="addProductForm" onsubmit="addProduct(event)">
                    <input class="form-control mb-2" name="name" placeholder="Product name" required>
                    <textarea class="form-control mb-2" name="description" rows="2" placeholder="Description" required></textarea>
                    <div class="row g-2">
                        <div class="col"><input class="form-control" type="number" step="0.01" name="mrp" placeholder="MRP" required></div>
                        <div class="col"><input class="form-control" type="number" step="0.01" name="discountedPrice" placeholder="Discounted price"></div>
                    </div>
                    <div class="row g-2 mt-1">
                        <div class="col"><input class="form-control" type="number" name="quantity" placeholder="Quantity" required></div>
                        <div class="col"><input class="form-control" type="number" name="inventoryThreshold" placeholder="Threshold" value="5"></div>
                    </div>
                    <input class="form-control mt-2" name="categoryName" placeholder="Category name" required>
                    <input class="form-control mt-2" name="imageUrl" placeholder="Image URL">
                    <button class="btn btn-primary w-100 mt-3" type="submit">Save Product</button>
                </form>
                <p id="sellerMessage" class="small mt-2"></p>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="card section-card p-3">
                <h5>Low Stock Alerts</h5>
                <div th:if="${#lists.isEmpty(lowStock)}" class="text-muted small">No low stock products.</div>
                <ul class="list-group list-group-flush" th:unless="${#lists.isEmpty(lowStock)}">
                    <li class="list-group-item px-0" th:each="p : ${lowStock}">
                        <span class="fw-semibold" th:text="${p.name}"></span>
                        <span class="text-danger small" th:text="| - only ${p.quantity} left|"></span>
                    </li>
                </ul>
            </div>
        </div>

        <div class="col-12">
            <div class="card section-card p-3">
                <h5>Your Inventory</h5>
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Qty</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="p : ${inventory}">
                            <td th:text="${p.id}"></td>
                            <td th:text="${p.name}"></td>
                            <td th:text="${p.category.name}"></td>
                            <td th:text="'INR ' + ${p.discountedPrice != null ? p.discountedPrice : p.mrp}"></td>
                            <td th:text="${p.quantity}"></td>
                            <td class="d-flex gap-1">
                                <button class="btn btn-sm btn-outline-secondary" th:onclick="|quickUpdateQty(${p.id}, ${p.quantity})|">Update Qty</button>
                                <button class="btn btn-sm btn-outline-danger" th:onclick="|deleteProduct(${p.id})|">Delete</button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-12">
            <div class="card section-card p-3">
                <h5>Notifications</h5>
                <div th:if="${#lists.isEmpty(notifications)}" class="text-muted small">No notifications yet.</div>
                <ul class="list-group list-group-flush" th:unless="${#lists.isEmpty(notifications)}">
                    <li class="list-group-item px-0" th:each="n : ${notifications}">
                        <span th:text="${n.message}"></span>
                        <small class="text-muted d-block" th:text="${#temporals.format(n.createdAt, 'dd MMM yyyy HH:mm')}"></small>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/seller-dashboard.js}"></script>
</body>
</html>
