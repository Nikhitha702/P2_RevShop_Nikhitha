<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Workbench - RevShop</title>
    <link rel="stylesheet" th:href="@{/css/site.css}">
</head>
<body>
<header class="topbar">
    <div class="topbar-row">
        <a class="brand" href="/">RevShop</a>
        <div class="nav-links">
            <a class="btn btn-secondary" href="/dashboard">Main Dashboard</a>
            <form action="/logout" method="post" style="margin:0;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-danger" type="submit">Logout</button>
            </form>
        </div>
    </div>
</header>

<main class="page">
    <div class="section-title">
        <h2>Seller Workbench</h2>
        <span class="small">Catalog, inventory, seller orders, notifications</span>
    </div>

    <section class="panel-grid">
        <article class="panel">
            <h3>Add Product</h3>
            <label>Name</label><input id="pName">
            <label>Description</label><textarea id="pDesc" rows="3"></textarea>
            <label>Price</label><input id="pPrice" type="number">
            <label>Discounted Price</label><input id="pDiscount" type="number">
            <label>Quantity</label><input id="pQty" type="number">
            <label>Low Stock Threshold</label><input id="pThreshold" type="number" value="5">
            <label>Category</label><input id="pCategory">
            <button class="btn btn-primary" style="margin-top:0.7rem;" onclick="addProduct()">Add Product</button>
        </article>

        <article class="panel">
            <h3>Update / Delete Product</h3>
            <label>Product Id</label><input id="uId" type="number">
            <label>New Quantity</label><input id="uQty" type="number">
            <label>New Price</label><input id="uPrice" type="number">
            <label>New Discounted Price</label><input id="uDiscount" type="number">
            <div class="row" style="margin-top:0.7rem;">
                <button class="btn btn-ok" onclick="updateProduct()">Update</button>
                <button class="btn btn-danger" onclick="deleteProduct()">Delete</button>
            </div>
        </article>

        <article class="panel">
            <h3>Inventory</h3>
            <div class="row">
                <button class="btn btn-secondary" onclick="loadInventory()">View Inventory</button>
                <button class="btn btn-secondary" onclick="loadLowStock()">Low Stock</button>
            </div>
        </article>

        <article class="panel">
            <h3>Seller Orders</h3>
            <button class="btn btn-secondary" onclick="loadSellerOrders()">View Seller Orders</button>
            <hr>
            <label>Order Id</label><input id="orderId" type="number">
            <label>Status</label>
            <select id="status">
                <option>SHIPPED</option>
                <option>DELIVERED</option>
            </select>
            <button class="btn btn-primary" style="margin-top:0.7rem;" onclick="updateOrderStatus()">Update Order Status</button>
        </article>

        <article class="panel">
            <h3>Notifications</h3>
            <button class="btn btn-secondary" onclick="listNotifications()">View Notifications</button>
        </article>
    </section>

    <pre class="log" id="sellerLog">Seller API responses will appear here.</pre>
</main>

<script th:src="@{/js/common.js}"></script>
<script th:src="@{/js/seller.js}"></script>
</body>
</html>
