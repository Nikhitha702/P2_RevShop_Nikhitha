<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - RevShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg top-nav sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-light" href="/home">RevShop</a>
        <div class="ms-auto d-flex gap-2">
            <a class="btn btn-sm btn-light" href="/home">Home</a>
            <a class="btn btn-sm btn-outline-light" href="/register/buyer">Buyer Register</a>
            <a class="btn btn-sm btn-outline-light" href="/register/seller">Seller Register</a>
        </div>
    </div>
</nav>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow-sm p-4">
                <h3 class="mb-3">Sign In</h3>
                <form method="post" action="/login">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input class="form-control" type="email" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input class="form-control" type="password" name="password" required>
                    </div>
                    <button class="btn btn-primary w-100" type="submit">Login</button>
                </form>
                <div class="mt-3 small text-danger" th:if="${param.error}">Invalid credentials.</div>
                <div class="mt-3 small text-success" th:if="${param.logout}">Logged out successfully.</div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
