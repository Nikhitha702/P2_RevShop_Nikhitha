<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RevShop</title>
    <link rel="stylesheet" th:href="@{/css/site.css}">
</head>
<body>
<header class="topbar">
    <div class="topbar-row">
        <a class="brand" href="/">RevShop</a>
        <div class="nav-links">
            <a class="btn btn-secondary" href="/register/buyer">Buyer Signup</a>
            <a class="btn btn-secondary" href="/register/seller">Seller Signup</a>
        </div>
    </div>
</header>

<main class="page">
    <section class="form-wrap">
        <h1>Sign In</h1>
        <p class="small">Login with your registered buyer/seller email and password.</p>
        <form method="post" action="/login">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label>Email</label>
            <input type="email" name="username" required>
            <label>Password</label>
            <input type="password" name="password" required>
            <button class="btn btn-primary" type="submit" style="margin-top:1rem; width:100%;">Login</button>
        </form>

        <p th:if="${param.error}" style="color:#dc2626;">Invalid email/password.</p>
        <p th:if="${param.logout}" style="color:#16a34a;">Logged out successfully.</p>

        <hr>
        <div class="row">
            <a class="btn btn-secondary" href="/register/buyer">Create Buyer Account</a>
            <a class="btn btn-secondary" href="/register/seller">Create Seller Account</a>
        </div>
    </section>
</main>
</body>
</html>
