<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer Workbench - RevShop</title>
    <link rel="stylesheet" th:href="@{/css/site.css}">
</head>
<body>
<header class="topbar">
    <div class="topbar-row">
        <a class="brand" href="/">RevShop</a>
        <div class="nav-links">
            <a class="btn btn-secondary" href="/dashboard">Main Dashboard</a>
            <form action="/logout" method="post" style="margin:0;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-danger" type="submit">Logout</button>
            </form>
        </div>
    </div>
</header>

<main class="page">
    <div class="section-title">
        <h2>Buyer Workbench</h2>
        <span class="small">Cart, orders, payment, favorites, reviews, notifications</span>
    </div>

    <section class="panel-grid">
        <article class="panel">
            <h3>Cart</h3>
            <label>Product Id</label><input id="cartProductId" type="number">
            <label>Quantity</label><input id="cartQty" type="number" value="1">
            <div class="row" style="margin-top:0.7rem;">
                <button class="btn btn-primary" onclick="addToCart()">Add</button>
                <button class="btn btn-secondary" onclick="viewCart()">View</button>
                <button class="btn btn-secondary" onclick="cartTotal()">Total</button>
            </div>
            <hr>
            <label>Cart Item Id</label><input id="cartItemId" type="number">
            <label>Update Quantity</label><input id="cartItemQty" type="number" value="1">
            <div class="row" style="margin-top:0.7rem;">
                <button class="btn btn-ok" onclick="updateCartItem()">Update</button>
                <button class="btn btn-danger" onclick="removeCartItem()">Remove</button>
            </div>
        </article>

        <article class="panel">
            <h3>Checkout & Orders</h3>
            <label>Shipping Address</label><textarea id="shipAddress" rows="2"></textarea>
            <label>Billing Address</label><textarea id="billAddress" rows="2"></textarea>
            <div class="row" style="margin-top:0.7rem;">
                <button class="btn btn-primary" onclick="checkout()">Checkout</button>
                <button class="btn btn-secondary" onclick="myOrders()">My Orders</button>
            </div>
            <hr>
            <label>Order Id</label><input id="payOrderId" type="number">
            <label>Payment Method</label>
            <select id="payMethod">
                <option>CREDIT_CARD</option>
                <option>DEBIT_CARD</option>
                <option>CASH_ON_DELIVERY</option>
            </select>
            <button class="btn btn-ok" style="margin-top:0.7rem;" onclick="payOrder()">Pay Now</button>
        </article>

        <article class="panel">
            <h3>Favorites</h3>
            <label>Product Id</label><input id="favProductId" type="number">
            <div class="row" style="margin-top:0.7rem;">
                <button class="btn btn-primary" onclick="addFavorite()">Add</button>
                <button class="btn btn-danger" onclick="removeFavorite()">Remove</button>
                <button class="btn btn-secondary" onclick="listFavorites()">View</button>
            </div>
        </article>

        <article class="panel">
            <h3>Reviews</h3>
            <label>Product Id</label><input id="reviewProductId" type="number">
            <label>Rating (1-5)</label><input id="reviewRating" type="number" min="1" max="5" value="5">
            <label>Comment</label><textarea id="reviewComment" rows="3"></textarea>
            <button class="btn btn-primary" style="margin-top:0.7rem;" onclick="addReview()">Submit Review</button>
        </article>

        <article class="panel">
            <h3>Notifications</h3>
            <label>Notification Id</label><input id="noteId" type="number">
            <div class="row" style="margin-top:0.7rem;">
                <button class="btn btn-secondary" onclick="listNotifications()">View</button>
                <button class="btn btn-ok" onclick="markRead()">Mark Read</button>
            </div>
        </article>
    </section>

    <pre class="log" id="buyerLog">Buyer API responses will appear here.</pre>
</main>

<script th:src="@{/js/common.js}"></script>
<script th:src="@{/js/buyer.js}"></script>
</body>
</html>
