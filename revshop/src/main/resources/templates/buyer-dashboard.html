<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>Buyer Dashboard - RevShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg top-nav sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">RevShop Buyer</a>
        <div class="ms-auto d-flex align-items-center gap-2">
            <a class="btn btn-sm btn-light" href="/">Storefront</a>
            <form method="post" action="/logout">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-sm btn-outline-light" type="submit">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="row g-4">
        <div class="col-lg-8">
            <div class="card section-card p-3 mb-3">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h5 class="mb-0">Browse Products</h5>
                    <input id="buyerSearch" class="form-control" style="max-width:280px" placeholder="Search catalog...">
                </div>
                <div class="d-flex flex-wrap gap-2 mb-3" id="buyerCategories">
                    <button class="category-chip" onclick="buyerFilterCategory('all')">All</button>
                    <button class="category-chip" th:each="cat : ${categories}" th:text="${cat.name}" th:onclick="|buyerFilterCategory('${cat.name}')|"></button>
                </div>
                <div class="row g-3" id="buyerProductGrid">
                    <div class="col-md-6" th:each="product : ${products}" th:attr="data-name=${product.name},data-category=${product.category.name}">
                        <div class="card product-card h-100">
                            <img class="product-image" th:src="${product.imageUrl != null && !#strings.isEmpty(product.imageUrl)} ? ${product.imageUrl} : 'https://dummyimage.com/600x400/f0f2f8/7d8ca6&text=RevShop'" alt="Product image">
                            <div class="card-body">
                                <h6 class="fw-bold" th:text="${product.name}"></h6>
                                <p class="small text-muted" th:text="${product.category.name}"></p>
                                <p class="small" th:text="${product.description}"></p>
                                <div class="d-flex align-items-center gap-2 mb-2">
                                    <span class="fw-bold text-primary" th:text="'INR ' + ${product.discountedPrice != null ? product.discountedPrice : product.mrp}"></span>
                                </div>
                                <div class="d-flex gap-2">
                                    <input class="form-control form-control-sm" th:id="|qty_${product.id}|" type="number" min="1" value="1">
                                    <button class="btn btn-sm btn-primary" th:onclick="|addToCart(${product.id})|">Add Cart</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card section-card p-3">
                <h5>Cart, Checkout & Payment</h5>
                <div class="row g-2 mb-3">
                    <div class="col-md-6"><textarea id="shipAddress" class="form-control" rows="2" placeholder="Shipping Address"></textarea></div>
                    <div class="col-md-6"><textarea id="billAddress" class="form-control" rows="2" placeholder="Billing Address"></textarea></div>
                </div>
                <div class="d-flex flex-wrap gap-2 mb-3">
                    <button class="btn btn-outline-primary" onclick="viewCart()">View Cart</button>
                    <button class="btn btn-outline-primary" onclick="cartTotal()">Cart Total</button>
                    <button class="btn btn-primary" onclick="checkout()">Checkout</button>
                    <button class="btn btn-outline-secondary" onclick="myOrders()">My Orders</button>
                </div>

                <div class="row g-2 align-items-end">
                    <div class="col-md-4"><input id="payOrderId" class="form-control" type="number" placeholder="Order ID"></div>
                    <div class="col-md-4">
                        <select id="payMethod" class="form-select">
                            <option>CASH_ON_DELIVERY</option>
                            <option>CREDIT_CARD</option>
                            <option>DEBIT_CARD</option>
                        </select>
                    </div>
                    <div class="col-md-4"><button class="btn btn-success w-100" onclick="payOrder()">Pay</button></div>
                </div>

                <pre id="buyerApiLog" class="bg-dark text-light p-3 rounded mt-3 small" style="min-height:120px">API responses appear here</pre>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card section-card p-3">
                <h5>Notifications</h5>
                <div th:if="${#lists.isEmpty(notifications)}" class="text-muted small">No notifications yet.</div>
                <div class="list-group list-group-flush" th:unless="${#lists.isEmpty(notifications)}">
                    <div class="list-group-item px-0" th:each="note : ${notifications}">
                        <div class="small" th:text="${note.message}"></div>
                        <div class="d-flex justify-content-between align-items-center mt-1">
                            <small class="text-muted" th:text="${#temporals.format(note.createdAt, 'dd MMM yyyy HH:mm')}"></small>
                            <span class="badge bg-success" th:if="${note.readStatus}">Read</span>
                            <button class="btn btn-sm btn-outline-primary" th:unless="${note.readStatus}" th:onclick="|markNotification(${note.id})|">Mark Read</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/buyer-dashboard.js}"></script>
</body>
</html>
