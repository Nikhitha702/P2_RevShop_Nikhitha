<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>Buyer Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg top-nav sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-light" href="/home">RevShop</a>
        <div class="ms-auto d-flex gap-2">
            <a class="btn btn-sm btn-light" href="/home">Home</a>
            <a class="btn btn-sm btn-outline-light" href="/login">Login</a>
            <a class="btn btn-sm btn-outline-light" href="/register/seller">Seller Register</a>
        </div>
    </div>
</nav>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card border-0 shadow-sm p-4">
                <h3 class="mb-3">Buyer Registration</h3>
                <form id="buyerForm" onsubmit="registerUser(event, 'buyerForm', '/api/auth/register/buyer', 'formMessage')">
                    <input class="form-control mb-2" name="firstName" placeholder="First name" required>
                    <input class="form-control mb-2" name="lastName" placeholder="Last name" required>
                    <input class="form-control mb-2" name="email" type="email" placeholder="Email" required>
                    <input class="form-control mb-2" name="password" type="password" minlength="6" placeholder="Password" required>
                    <input class="form-control mb-2" name="phone" placeholder="Phone (10-15 digits)" required>
                    <textarea class="form-control mb-3" name="address" rows="2" placeholder="Address" required></textarea>
                    <button class="btn btn-primary w-100" type="submit">Create Buyer Account</button>
                </form>
                <p id="formMessage" class="mt-3 small"></p>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/auth.js}"></script>
</body>
</html>
