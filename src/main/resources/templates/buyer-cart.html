<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>My Cart - RevShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div id="toastContainer" class="toast-container-custom"></div>
<nav class="navbar navbar-expand-lg top-nav sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/buyer/dashboard">
            <i class="bi bi-bag-heart-fill"></i>
            <span>RevShop Buyer</span>
        </a>
        <div class="ms-auto d-flex align-items-center gap-2">
            <a class="btn btn-sm btn-light" href="/buyer/dashboard"><i class="bi bi-grid me-1"></i>Dashboard</a>
            <a class="btn btn-sm btn-outline-light" href="/buyer/checkout"><i class="bi bi-box-seam me-1"></i>Checkout</a>
            <a class="btn btn-sm btn-outline-light" href="/buyer/payment"><i class="bi bi-credit-card me-1"></i>Payment</a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="card section-card p-3">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="mb-0"><i class="bi bi-cart3 me-2"></i>My Cart</h4>
            <div class="d-flex align-items-center gap-2">
                <span class="badge text-bg-primary p-2"><i class="bi bi-receipt-cutoff me-1"></i><span id="cartTotalValue">INR 0</span></span>
                <button class="btn btn-outline-primary btn-sm" onclick="viewCart()"><i class="bi bi-arrow-clockwise"></i></button>
                <button class="btn btn-primary btn-sm" onclick="cartTotal()"><i class="bi bi-calculator"></i></button>
            </div>
        </div>
        <div id="cartList" class="small text-muted">Loading cart...</div>
        <div class="mt-3 text-end">
            <a class="btn btn-success" href="/buyer/checkout"><i class="bi bi-box-arrow-right me-1"></i>Proceed to Checkout</a>
        </div>
    </div>
</div>

<script th:src="@{/js/buyer-common.js}"></script>
<script th:src="@{/js/buyer-cart-page.js}"></script>
</body>
</html>
