<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>Payment - RevShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div id="toastContainer" class="toast-container-custom"></div>
<nav class="navbar navbar-expand-lg top-nav sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/buyer/dashboard">
            <i class="bi bi-bag-heart-fill"></i>
            <span>RevShop Buyer</span>
        </a>
        <div class="ms-auto d-flex align-items-center gap-2">
            <a class="btn btn-sm btn-light" href="/buyer/dashboard"><i class="bi bi-grid me-1"></i>Dashboard</a>
            <a class="btn btn-sm btn-outline-light" href="/buyer/cart"><i class="bi bi-cart3 me-1"></i>Cart</a>
            <a class="btn btn-sm btn-outline-light" href="/buyer/checkout"><i class="bi bi-box-seam me-1"></i>Checkout</a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="card section-card p-3 mb-3">
        <h4 class="mb-3"><i class="bi bi-credit-card me-2"></i>Payment</h4>
        <div class="row g-2 align-items-end">
            <div class="col-md-4">
                <label for="payOrderId" class="form-label"><i class="bi bi-hash me-1"></i>Order ID</label>
                <input id="payOrderId" class="form-control" type="number" placeholder="Enter order ID">
            </div>
            <div class="col-md-4">
                <label for="payMethod" class="form-label"><i class="bi bi-wallet me-1"></i>Method</label>
                <select id="payMethod" class="form-select">
                    <option>CASH_ON_DELIVERY</option>
                    <option>CREDIT_CARD</option>
                    <option>DEBIT_CARD</option>
                </select>
            </div>
            <div class="col-md-4">
                <button class="btn btn-success w-100" onclick="payOrder()"><i class="bi bi-check2-circle me-1"></i>Pay Now</button>
            </div>
        </div>
    </div>

    <div class="card section-card p-3">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h5 class="mb-0"><i class="bi bi-box2-heart me-2"></i>My Orders</h5>
            <button class="btn btn-outline-primary btn-sm" onclick="myOrders()"><i class="bi bi-arrow-clockwise"></i></button>
        </div>
        <div id="orderList" class="small text-muted">Loading orders...</div>
    </div>
</div>

<script th:src="@{/js/buyer-common.js}"></script>
<script th:src="@{/js/buyer-payment-page.js}"></script>
</body>
</html>
